# Build installable bundles for macOS (.dmg) and Linux (.deb/.AppImage/.rpm).
#
# PRIVATE distribution only — the app bundles the copyrighted Clawd mascot +
# proprietary Anthropic fonts (see REFERENCE.md). Artifacts live on this
# private repo; do NOT publish them.
#
# Run manually (Actions → build → Run workflow) or push a v* tag.
name: build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # arm64 .app + .dmg
          - platform: ubuntu-22.04 # .deb + .AppImage + .rpm
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Linux system deps (webkit2gtk etc.)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libfuse2

      - run: npm install

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build bundles
        run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: claude-usage-widget-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
